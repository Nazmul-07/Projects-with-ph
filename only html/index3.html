<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nazmul Restaurant</title>
  </head>
  <body>
    <header>
      <h1>Nazmul Restaurant</h1>
      <hr />
      <h3>Menu Book</h3>
    </header>

    <main>
      <img
        height="600"
        width="100%"
        src="/media/Main menu.jpg"
        alt="main_menu"
      />
      <p><strong>Food Item</strong></p>
      <hr />
      <img height="100" width="150" src="/media/Burger.png" alt="Burger" />
      <p><strong>Double cheese Burger. BDT-250</strong></p>
      <img height="100" width="150" src="/media/pizza.jpg" alt="pizza" />
      <p><strong>Pizza napoletana. BDT-600</strong></p>
      <img height="100" width="150" src="/media/pasta.jpg" alt="pasta" />
      <p><strong>Creamy white pasta. BDT-300</strong></p>
      <hr />
      <h2>Discount</h2>
      <p><strong>20% OFF</strong> for all item.</p>
      <hr />
      <h3>Order here.</h3>
      <label for="">Your name:</label>
      <input type="text" name="" id="" /><br /><br />
      <label for="">Select item:</label>
      <select name="" id="">
        <option value="">Double cheese Burger</option>
        <option value="">Pizza napoletana</option>
        <option value="">Creamy white pasta</option>
      </select>
      <br /><br />
      <button>Place Order</button>
      <hr />
      <h3>Payment</h3>
      <input type="radio" name="" id="" /> Cash <br />
      <input type="radio" name="" id="" /> bKash <br />
      <input type="radio" name="" id="" /> Card <br />
      <br />
      <button>Pay Now</button>
    </main>
  </body>
</html>
