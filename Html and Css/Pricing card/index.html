<!DOCTYPE html>
<html lang="en">

    <title>Pricing Card</title>
    <link rel="stylesheet" href="/Pricing card/style.css">
</head>
<body>
    <main>
        <section class="all-card">
            <div class="card">
                <h2>BASIC</h2>
                <h3>$10</h3>
                <ul>
                    <li>feature one</li>
                    <li>feature two</li>
                    <li>feature three</li>
                    <li>feature four</li>
                </ul>
                <button>CHOOSE PLAN</button>
            </div>
            <div class="card diff">
                <h2>STANDARD</h2>
                <h3>$20</h3>
                <ul>
                    <li>feature one</li>
                    <li>feature two</li>
                    <li>feature three</li>
                    <li>feature four</li>
                </ul>
                <button>CHOOSE PLAN</button>
            </div>
            <div class="card">
                <h2>PREMIUM</h2>
                <h3>$30</h3>
                <ul>
                    <li>feature one</li>
                    <li>feature two</li>
                    <li>feature three</li>
                    <li>feature four</li>
                </ul>
                <button>CHOOSE PLAN</button>
            </div>
        </section>
    </main>
</body>
</html>
